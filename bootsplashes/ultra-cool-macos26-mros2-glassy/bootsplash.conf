# Ultra Cool OS - macOS 26 + mrOS 2.0 + Glassy Samsung Style
# Modern, ultra-futuristic boot configuration

# Background with glassy effect and modern gradient
bg=0x0a0a0a
text_color=0xffffff
highlight_color=0x007aff

# Modern animation settings
animation=fade_in
animation_duration=2000
blur_effect=true
glass_effect=true
transparency=0.85

# Samsung-style modern elements
rounded_corners=true
corner_radius=20
shadow_effect=true
glow_effect=true

# macOS 26 inspired elements
dock_style=floating
window_style=rounded
accent_color=0x007aff
secondary_color=0x34c759

# mrOS 2.0 integration
system_name="Ultra Cool OS"
version="1.0 - macOS 26 + mrOS 2.0 Fusion"
subtitle="Glassy Samsung Style Edition"

# Modern boot sequence
show_progress=true
progress_style=modern
progress_color=0x007aff
progress_background=0x1c1c1e

# Ultra modern effects
particle_effects=true
dynamic_background=true
smooth_transitions=true

