<?xml version="1.0" encoding="UTF-8"?>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Ultra Cool OS Advanced Boot Animation -->
    <!-- macOS 26 + mrOS 2.0 + Samsung Glassy Style Boot Experience -->
    
    <!-- Background gradient -->
    <radialGradient id="bootBg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#16213e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f0f23;stop-opacity:1"/>
    </radialGradient>
    
    <!-- Logo gradient -->
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007aff;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#5856d6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#34c759;stop-opacity:1"/>
    </linearGradient>
    
    <!-- Progress bar gradient -->
    <linearGradient id="progressGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#007aff;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#5856d6;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#34c759;stop-opacity:0.8"/>
    </linearGradient>
    
    <!-- Glass effect -->
    <filter id="glass">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offset"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.1"/>
      <feComposite in2="offset" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Pulse animation -->
    <animate id="pulse" attributeName="opacity" 
             values="0.3;1;0.3" 
             dur="2s" 
             repeatCount="indefinite"/>
    
    <!-- Rotation animation -->
    <animateTransform id="rotate" attributeName="transform" 
                      type="rotate" 
                      values="0 960 540;360 960 540" 
                      dur="3s" 
                      repeatCount="indefinite"/>
  </defs>
  
  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bootBg)"/>
  
  <!-- Animated background particles -->
  <g opacity="0.1">
    <circle cx="300" cy="200" r="2" fill="#007aff">
      <animate attributeName="cy" values="200;800;200" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.3;0" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="300" r="1.5" fill="#5856d6">
      <animate attributeName="cy" values="300;700;300" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.4;0" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1200" cy="250" r="2.5" fill="#34c759">
      <animate attributeName="cy" values="250;750;250" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.2;0" dur="12s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1500" cy="400" r="1" fill="#ff9500">
      <animate attributeName="cy" values="400;600;400" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Main logo container -->
  <g transform="translate(960, 400)">
    <!-- Outer glow ring -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="url(#logoGradient)" 
            stroke-width="2" opacity="0.3" filter="url(#glow)">
      <animate attributeName="r" values="80;90;80" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Middle ring -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="url(#logoGradient)" 
            stroke-width="3" opacity="0.5">
      <animate attributeName="r" values="60;65;60" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Inner core -->
    <circle cx="0" cy="0" r="40" fill="url(#logoGradient)" opacity="0.8" filter="url(#glass)">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Ultra Cool OS logo symbol -->
    <g transform="scale(0.8)">
      <!-- Stylized "U" -->
      <path d="M -25,-20 L -25,10 Q -25,25 -10,25 L 10,25 Q 25,25 25,10 L 25,-20" 
            fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.9">
        <animate attributeName="stroke-dasharray" values="0,200;100,200;200,200" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="stroke-dashoffset" values="0;-100;-200" dur="2s" repeatCount="indefinite"/>
      </path>
      
      <!-- Stylized "C" -->
      <path d="M 35,10 Q 50,25 65,10 Q 50,-5 35,-20" 
            fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.8">
        <animate attributeName="stroke-dasharray" values="0,100;50,100;100,100" dur="2.5s" repeatCount="indefinite"/>
        <animate attributeName="stroke-dashoffset" values="0;-50;-100" dur="2.5s" repeatCount="indefinite"/>
      </path>
    </g>
    
    <!-- Rotating accent elements -->
    <g opacity="0.6">
      <circle cx="50" cy="0" r="3" fill="#007aff">
        <animateTransform attributeName="transform" type="rotate" 
                          values="0 0 0;360 0 0" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-50" cy="0" r="3" fill="#5856d6">
        <animateTransform attributeName="transform" type="rotate" 
                          values="0 0 0;-360 0 0" dur="5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="50" r="2" fill="#34c759">
        <animateTransform attributeName="transform" type="rotate" 
                          values="0 0 0;360 0 0" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="-50" r="2" fill="#ff9500">
        <animateTransform attributeName="transform" type="rotate" 
                          values="0 0 0;-360 0 0" dur="6s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>
  
  <!-- Ultra Cool OS Text -->
  <g transform="translate(960, 550)">
    <text x="0" y="0" text-anchor="middle" 
          font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" 
          font-size="36" font-weight="300" fill="#ffffff" opacity="0.9">
      Ultra Cool OS
      <animate attributeName="opacity" values="0;0.9;0" dur="3s" repeatCount="indefinite"/>
    </text>
    
    <text x="0" y="40" text-anchor="middle" 
          font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" 
          font-size="16" font-weight="200" fill="#ffffff" opacity="0.6">
      macOS 26 + mrOS 2.0 + Samsung Glassy Style
      <animate attributeName="opacity" values="0;0.6;0" dur="4s" repeatCount="indefinite"/>
    </text>
  </g>
  
  <!-- Progress indicator -->
  <g transform="translate(960, 650)">
    <!-- Progress bar background -->
    <rect x="-150" y="-3" width="300" height="6" rx="3" 
          fill="rgba(255,255,255,0.1)" filter="url(#glass)"/>
    
    <!-- Progress bar fill -->
    <rect x="-150" y="-3" width="0" height="6" rx="3" 
          fill="url(#progressGradient)" filter="url(#glow)">
      <animate attributeName="width" values="0;300;0" dur="5s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Progress dots -->
    <g opacity="0.7">
      <circle cx="-100" cy="0" r="2" fill="#007aff">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite" begin="0s"/>
      </circle>
      <circle cx="-50" cy="0" r="2" fill="#5856d6">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite" begin="0.2s"/>
      </circle>
      <circle cx="0" cy="0" r="2" fill="#34c759">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite" begin="0.4s"/>
      </circle>
      <circle cx="50" cy="0" r="2" fill="#ff9500">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite" begin="0.6s"/>
      </circle>
      <circle cx="100" cy="0" r="2" fill="#ff3b30">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite" begin="0.8s"/>
      </circle>
    </g>
  </g>
  
  <!-- Status text -->
  <g transform="translate(960, 720)">
    <text x="0" y="0" text-anchor="middle" 
          font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" 
          font-size="14" font-weight="400" fill="#ffffff" opacity="0.7">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
      Starting Ultra Cool OS...
    </text>
  </g>
  
  <!-- Loading animation phases -->
  <g id="loadingPhases">
    <!-- Phase 1: System initialization -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="0s"/>
      <text x="960" y="750" text-anchor="middle" 
            font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" 
            font-size="12" font-weight="300" fill="#007aff">
        Initializing system...
      </text>
    </g>
    
    <!-- Phase 2: Loading UI framework -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="2s"/>
      <text x="960" y="750" text-anchor="middle" 
            font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" 
            font-size="12" font-weight="300" fill="#5856d6">
        Loading glassy UI framework...
      </text>
    </g>
    
    <!-- Phase 3: Applying optimizations -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="4s"/>
      <text x="960" y="750" text-anchor="middle" 
            font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" 
            font-size="12" font-weight="300" fill="#34c759">
        Applying performance optimizations...
      </text>
    </g>
    
    <!-- Phase 4: Ready -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="1s" begin="6s" fill="freeze"/>
      <text x="960" y="750" text-anchor="middle" 
            font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" 
            font-size="12" font-weight="300" fill="#ffffff">
        Welcome to Ultra Cool OS!
      </text>
    </g>
  </g>
  
  <!-- Subtle grid pattern overlay -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  
  <!-- Final glass overlay -->
  <rect width="1920" height="1080" fill="rgba(255,255,255,0.02)" filter="url(#glass)"/>
</svg>

