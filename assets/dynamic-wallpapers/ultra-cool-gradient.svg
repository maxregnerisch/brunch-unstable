<?xml version="1.0" encoding="UTF-8"?>
<svg width="2560" height="1440" viewBox="0 0 2560 1440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Ultra Cool OS Dynamic Gradient Background -->
    <!-- macOS 26 + mrOS 2.0 + Samsung Glassy Style -->
    
    <!-- Main background gradient -->
    <radialGradient id="mainBg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1">
        <animate attributeName="stop-color" 
                 values="#1a1a2e;#2d1b69;#1a1a2e" 
                 dur="20s" 
                 repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1">
        <animate attributeName="stop-color" 
                 values="#16213e;#0f3460;#16213e" 
                 dur="25s" 
                 repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#0f0f23;stop-opacity:1">
        <animate attributeName="stop-color" 
                 values="#0f0f23;#1a0033;#0f0f23" 
                 dur="30s" 
                 repeatCount="indefinite"/>
      </stop>
    </radialGradient>
    
    <!-- Floating orb gradients -->
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#007aff;stop-opacity:0.4"/>
      <stop offset="70%" style="stop-color:#007aff;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#007aff;stop-opacity:0"/>
    </radialGradient>
    
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#5856d6;stop-opacity:0.3"/>
      <stop offset="70%" style="stop-color:#5856d6;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#5856d6;stop-opacity:0"/>
    </radialGradient>
    
    <radialGradient id="orb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#34c759;stop-opacity:0.2"/>
      <stop offset="70%" style="stop-color:#34c759;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#34c759;stop-opacity:0"/>
    </radialGradient>
    
    <radialGradient id="orb4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff9500;stop-opacity:0.15"/>
      <stop offset="70%" style="stop-color:#ff9500;stop-opacity:0.03"/>
      <stop offset="100%" style="stop-color:#ff9500;stop-opacity:0"/>
    </radialGradient>
    
    <!-- Glass effect overlay -->
    <linearGradient id="glassOverlay" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.05"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.02"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.08"/>
    </linearGradient>
    
    <!-- Noise texture for depth -->
    <filter id="noise">
      <feTurbulence baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="discrete" tableValues="0.02 0.04 0.06 0.08"/>
      </feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
    
    <!-- Blur filter for glass effect -->
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
  </defs>
  
  <!-- Main background -->
  <rect width="2560" height="1440" fill="url(#mainBg)"/>
  
  <!-- Floating orbs with animations -->
  <!-- Large primary orb -->
  <circle cx="640" cy="360" r="300" fill="url(#orb1)" opacity="0.6">
    <animateTransform attributeName="transform" 
                      type="translate" 
                      values="0,0; 50,30; -30,50; 0,0" 
                      dur="40s" 
                      repeatCount="indefinite"/>
    <animate attributeName="opacity" 
             values="0.6;0.8;0.4;0.6" 
             dur="15s" 
             repeatCount="indefinite"/>
  </circle>
  
  <!-- Secondary orb -->
  <circle cx="1920" cy="1080" r="250" fill="url(#orb2)" opacity="0.5">
    <animateTransform attributeName="transform" 
                      type="translate" 
                      values="0,0; -40,20; 60,-40; 0,0" 
                      dur="35s" 
                      repeatCount="indefinite"/>
    <animate attributeName="opacity" 
             values="0.5;0.3;0.7;0.5" 
             dur="18s" 
             repeatCount="indefinite"/>
  </circle>
  
  <!-- Accent orb -->
  <circle cx="1280" cy="720" r="150" fill="url(#orb3)" opacity="0.4">
    <animateTransform attributeName="transform" 
                      type="translate" 
                      values="0,0; 30,-50; -50,30; 0,0" 
                      dur="30s" 
                      repeatCount="indefinite"/>
    <animate attributeName="opacity" 
             values="0.4;0.6;0.2;0.4" 
             dur="12s" 
             repeatCount="indefinite"/>
  </circle>
  
  <!-- Small floating orbs -->
  <circle cx="400" cy="1200" r="80" fill="url(#orb4)" opacity="0.3">
    <animateTransform attributeName="transform" 
                      type="translate" 
                      values="0,0; 20,40; -30,-20; 0,0" 
                      dur="25s" 
                      repeatCount="indefinite"/>
  </circle>
  
  <circle cx="2200" cy="300" r="100" fill="url(#orb1)" opacity="0.25">
    <animateTransform attributeName="transform" 
                      type="translate" 
                      values="0,0; -25,35; 45,-25; 0,0" 
                      dur="28s" 
                      repeatCount="indefinite"/>
  </circle>
  
  <circle cx="800" cy="900" r="60" fill="url(#orb2)" opacity="0.2">
    <animateTransform attributeName="transform" 
                      type="translate" 
                      values="0,0; 35,-30; -20,45; 0,0" 
                      dur="22s" 
                      repeatCount="indefinite"/>
  </circle>
  
  <!-- Glass overlay for Samsung-style effect -->
  <rect width="2560" height="1440" fill="url(#glassOverlay)" filter="url(#blur)"/>
  
  <!-- Subtle noise texture for depth -->
  <rect width="2560" height="1440" fill="#000000" opacity="0.03" filter="url(#noise)"/>
  
  <!-- Top highlight for glass effect -->
  <rect width="2560" height="2" fill="url(#glassOverlay)" opacity="0.3"/>
  
  <!-- Animated particles -->
  <g opacity="0.1">
    <circle cx="200" cy="200" r="2" fill="#ffffff">
      <animateTransform attributeName="transform" 
                        type="translate" 
                        values="0,1440; 0,-100" 
                        dur="20s" 
                        repeatCount="indefinite"/>
      <animate attributeName="opacity" 
               values="0;0.3;0" 
               dur="20s" 
               repeatCount="indefinite"/>
    </circle>
    
    <circle cx="800" cy="200" r="1.5" fill="#007aff">
      <animateTransform attributeName="transform" 
                        type="translate" 
                        values="0,1440; 0,-100" 
                        dur="25s" 
                        repeatCount="indefinite"/>
      <animate attributeName="opacity" 
               values="0;0.4;0" 
               dur="25s" 
               repeatCount="indefinite"/>
    </circle>
    
    <circle cx="1400" cy="200" r="2.5" fill="#5856d6">
      <animateTransform attributeName="transform" 
                        type="translate" 
                        values="0,1440; 0,-100" 
                        dur="18s" 
                        repeatCount="indefinite"/>
      <animate attributeName="opacity" 
               values="0;0.2;0" 
               dur="18s" 
               repeatCount="indefinite"/>
    </circle>
    
    <circle cx="2000" cy="200" r="1" fill="#34c759">
      <animateTransform attributeName="transform" 
                        type="translate" 
                        values="0,1440; 0,-100" 
                        dur="30s" 
                        repeatCount="indefinite"/>
      <animate attributeName="opacity" 
               values="0;0.5;0" 
               dur="30s" 
               repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Ultra Cool OS branding (subtle) -->
  <g opacity="0.05" transform="translate(1280, 720)">
    <text x="0" y="0" text-anchor="middle" 
          font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" 
          font-size="48" 
          font-weight="300" 
          fill="#ffffff">
      Ultra Cool OS
    </text>
  </g>
</svg>

